spring.application.name=trading-bot
server.port=8081

spring.config.import=optional:file:.env[.properties]
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{0} - %msg%n

# BINANCE TOOLS
binance.websocket.stream.url=wss://stream.binance.com:9443
binance.http.futures.url=https://fapi.binance.com/fapi/v1/
binance.test.base.url=https://testnet.binance.vision
binance.path.klines=/api/v3/klines
binance.path.order=/api/v3/order
binance.path.balance=/api/v3/account
binance.api.secret=${Secret_Key}
binance.api.key=${API_KEY}

cyclic.http.time=60000


# KONFIGURACJA WĄTKÓW
spring.task.execution.thread-name-prefix=BotWorker-
# wątki działające cały czas w tle - dostępne
spring.task.execution.pool.core-size=4
# max liczba wątków, jeśli nagle przyjdzie gigantyczny ruch z giełdy
spring.task.execution.pool.max-size=10
# liczba zadań, które mogą czekać w kolejce, jeśli wszystkie 10 wątków jest zajętych
spring.task.execution.pool.queue-capacity=100

# POŁĄCZENIE Z BAZĄ DANYCH POSTGRESQL
spring.docker.compose.enabled=false
spring.datasource.url=jdbc:postgresql://localhost:5432/trading-system
spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# włączenie flyway do inicjalizacji bazy danych z plików .sql
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_history_module_trading_bot
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.backend-service.url=http://localhost:8080/api/internal
app.security.internal-api-secret=404E635266556A586E3272357538782F413F4438472B4B6250645367566B5970
app.security.hash-algorithm=HmacSHA256

# Redis Serwer
redis.bot.active-wallets.endpoint=bot.active-wallets
spring.data.redis.port=6379

# Locally:
spring.data.redis.host=localhost

