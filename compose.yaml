name: trading-system

services:
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

  db:
    image: postgres:latest
    container_name: trading-postgres
    hostname: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading-system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - trading_db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading-system"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: trading-backend
    restart: unless-stopped
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"

  trading-bot:
    container_name: trading-bot
    restart: unless-stopped
    build: ./trading-bot
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "8081:8081"

  frontend:
    container_name: trading-frontend
    restart: unless-stopped
    build: ./frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  trading_db:
  redis_data: